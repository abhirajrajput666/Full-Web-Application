<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Auth Screen -->
    <div class="auth-screen" id="authScreen">
        <div class="auth-box">
            <h1>📚 Study Tracker</h1>
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('register')">Register</button>
            </div>
            <div id="authError" class="auth-error"></div>
            <input type="text" id="authUsername" placeholder="Username" />
            <input type="password" id="authPassword" placeholder="Password" />
            <button class="auth-submit" id="authSubmit" onclick="submitAuth()">Login</button>
        </div>
    </div>

    <!-- App Screen -->
    <div class="app" id="appScreen" style="display:none">
        <div class="app-header">
            <h1>📚 My Study Tracker</h1>
            <div class="user-info">
                <span id="welcomeUser"></span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Total Hours</div>
                <div class="stat-value" id="totalHours">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Sessions</div>
                <div class="stat-value" id="totalSessions">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg Duration</div>
                <div class="stat-value" id="avgDuration">0m</div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="subjectInput" placeholder="Subject name..." />
            <input type="number" id="durationInput" placeholder="Duration (minutes)" min="1" />
            <select id="difficulty">
                <option value="easy">🟢 Easy</option>
                <option value="medium" selected>🟡 Medium</option>
                <option value="hard">🔴 Hard</option>
            </select>
            <button onclick="addSession()">Add Session</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="filterSessions('all', this)">All</button>
            <button class="filter-btn" onclick="filterSessions('today', this)">Today</button>
            <button class="filter-btn" onclick="filterSessions('week', this)">This Week</button>
        </div>

        <div id="loadingMsg" class="empty-msg" style="display:none">Loading...</div>
        <ul id="sessionList"></ul>

        <div class="footer">
            <span id="count">0 sessions</span>
            <button class="clear-btn" onclick="clearOldSessions()">Clear Old Sessions</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
